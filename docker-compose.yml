services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ois
      POSTGRES_PASSWORD: ois
      POSTGRES_DB: ois_discovery
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ois -d ois_discovery"]
      interval: 5s
      timeout: 5s
      retries: 10

  discovery:
    build:
      context: .
      dockerfile: discovery/Dockerfile
    ports:
      - "8001:8001"
    environment:
      DATABASE_URL: postgresql://ois:ois@postgres/ois_discovery
      CORS_ORIGINS: "http://localhost:8080,https://PRYSYM.github.io"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
