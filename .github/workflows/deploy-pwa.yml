name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "pwa/**"
      - "data/**"
      - "docs/**"
      - ".github/workflows/deploy-pwa.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment runs at a time
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Regenerate pool.js and alias.js from source
        run: python pwa/scripts/export_data.py

      - name: Build combined site
        run: |
          mkdir -p _site/app
          # Landing page at root
          cp docs/index.html _site/index.html
          # PWA at /app/
          cp -r pwa/. _site/app/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
